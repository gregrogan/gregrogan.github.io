<!doctype html>
<html lang="en">
  <head>
    {% if jekyll.environment == 'production' %}
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-58783861-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-58783861-1');
    </script>
    {% endif %}

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description }}">
    <meta name="theme-color" content="#f6f2ea">

    <title>{{ page.title }}</title>

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="mask-icon" href="safari-pinned-tab.svg" color="#334b42">

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Greg Rogan",
        "jobTitle": "Saxophone, clarinet and flute tutor",
        "url": "https://music.gregrogan.com",
        "email": "greg@gregrogan.com",
        "telephone": "+64273611389",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Wellington",
          "addressRegion": "Wellington",
          "postalCode": "6011",
          "addressCountry": "NZ"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Greg Rogan Music Lessons",
        "url": "https://music.gregrogan.com",
        "image": "https://music.gregrogan.com/assets/img/action.png",
        "description": "{{ page.description }}",
        "telephone": "+64273611389",
        "email": "greg@gregrogan.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Thorndon",
          "addressRegion": "Wellington",
          "postalCode": "6011",
          "addressCountry": "NZ"
        }
      }
    </script>

    <link rel="stylesheet" href="assets/css/site.css">
    <script src="assets/js/image-rotate.js" defer></script>
  </head>
  <body class="page-fade">
    {{ content }}
  </body>
</html>
